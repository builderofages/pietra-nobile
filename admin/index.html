<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pietra Nobile — Staff</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginView" class="center-wrap">
  <div class="login-card">
    <h1 class="brand">Pietra <span>Nobile</span></h1>
    <p class="sub">Staff Portal</p>
    <form id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" required autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" required autocomplete="current-password"></div>
      <p class="err" id="loginErr"></p>
      <button class="btn" type="submit">Sign In</button>
    </form>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashView" class="hidden">
  <header class="topbar">
    <h1 class="brand small">Pietra <span>Nobile</span> <em>Staff</em></h1>
    <div class="topbar-right">
      <span id="whoami"></span>
      <button class="btn ghost" id="signOut">Sign Out</button>
    </div>
  </header>

  <div class="kpis">
    <div class="kpi"><div class="n" id="kpiNew">–</div><div class="l">New Inquiries</div></div>
    <div class="kpi"><div class="n" id="kpiInq">–</div><div class="l">Total Inquiries</div></div>
    <div class="kpi"><div class="n" id="kpiOrders">–</div><div class="l">Open Orders</div></div>
    <div class="kpi"><div class="n" id="kpiRev">–</div><div class="l">Pipeline Value</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="inquiries">Inquiries</button>
    <button class="tab" data-tab="orders">Orders</button>
  </div>

  <!-- Inquiries -->
  <section id="tab-inquiries" class="tab-panel">
    <table>
      <thead><tr><th>Date</th><th>Name</th><th>Contact</th><th>Interest</th><th>Budget</th><th>Message</th><th>Status</th><th></th></tr></thead>
      <tbody id="inqRows"></tbody>
    </table>
  </section>

  <!-- Orders -->
  <section id="tab-orders" class="tab-panel hidden">
    <div class="panel-head">
      <button class="btn" id="newOrderBtn">+ New Order</button>
    </div>
    <table>
      <thead><tr><th>Date</th><th>Customer</th><th>Item</th><th>Amount</th><th>Deposit</th><th>Status</th></tr></thead>
      <tbody id="orderRows"></tbody>
    </table>
  </section>
</div>

<!-- ================= NEW ORDER MODAL ================= -->
<div id="orderModal" class="modal hidden">
  <div class="modal-card">
    <h2>New Order</h2>
    <form id="orderForm">
      <div class="field"><label>Customer Name</label><input type="text" id="oName" required></div>
      <div class="field"><label>Email</label><input type="email" id="oEmail"></div>
      <div class="field"><label>Phone</label><input type="tel" id="oPhone"></div>
      <div class="field"><label>Item</label><input type="text" id="oItem" required placeholder="e.g. Tiered Fountain — Bianco Carrara"></div>
      <div class="field"><label>Description / Specs</label><textarea id="oDesc" rows="2"></textarea></div>
      <div class="field"><label>Amount (USD)</label><input type="number" id="oAmount" step="0.01"></div>
      <p class="err" id="orderErr"></p>
      <div class="modal-actions">
        <button type="button" class="btn ghost" id="orderCancel">Cancel</button>
        <button type="submit" class="btn">Create Order</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
